services:
  backend:
    image: skillgap-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skillgap-backend
    env_file:
      - backend/environment.env
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    image: skillgap-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: skillgap-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8080:80"
